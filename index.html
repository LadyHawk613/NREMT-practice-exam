    <style>
        /* General page setup */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F07167; /* A warm coral color */
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container for the menu */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 950px; /* Expanded to comfortably fit 4 columns */
            text-align: center;
        }
        
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #222222;
            margin-bottom: 20px;
        }

        /* Menu item list styling - 4 columns by 5 rows grid */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 equal columns */
            grid-template-rows: repeat(5, 1fr);    /* 5 rows */
            gap: 15px;                             /* 15px space between boxes */
        }

        li {
           margin: 0;
        }

        /* Styling links to look like clean square buttons */
        a {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;                   /* Forces the button to be a perfect square */
            padding: 10px;
            background-color: #0081A7;             /* Clean blue button color */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            text-align: center;
            box-sizing: border-box;
        }

        /* Styling for images you will add inside */
        a img {
            width: 40px;  /* Adjust size as needed */
            height: 40px; /* Adjust size as needed */
            object-fit: contain;
            margin-bottom: 8px; /* Space between image and text */
        }

        /* Interactive hover effects */
        a:hover {
            background-color: #00afb9; /* Lighter blue on hover */
        }
        
        a:active {
            transform: scale(0.98); /* Slight click feedback */
        }
    </style>
</head>
