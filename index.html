<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NREMT Practice Exam Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a4472; /* Medium EMT Blue background */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        h1 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            max-width: 750px;
            height: 72vh;
            max-height: 460px;
        }
        .exam-btn {
            background-color: #ffffff;
            border: 2px solid #0f2c4c;
            border-radius: 5px;
            color: #1a4472;
            font-size: 0.7rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
            word-break: break-word;
        }
        .exam-btn:hover {
            background-color: #ffcc00;
            color: #1a4472;
            border-color: #cca300;
        }
    </style>
</head>
<body>

    <h1>NREMT Practice Exam Dashboard</h1>

    <div class="grid-container">
        <button class="exam-btn">Airway, Respiration & Ventilation</button>
        <button class="exam-btn">Cardiology & Resuscitation</button>
        <button class="exam-btn">Medical & Obstetrics</button>
        <button class="exam-btn">Trauma</button>
        <button class="exam-btn">EMS Operations</button>
        
        <button class="exam-btn">Pharmacology</button>
        <button class="exam-btn">Cardiovascular Emergencies</button>
        <button class="exam-btn">Respiratory Emergencies</button>
        <button class="exam-btn">Neurological Emergencies</button>
        <button class="exam-btn">Gastrointestinal & Urologic</button>

        <button class="exam-btn">Endocrine & Hematologic</button>
        <button class="exam-btn">Allergic & Anaphylactic</button>
        <button class="exam-btn">Toxicology</button>
        <button class="exam-btn">Behavioral Emergencies</button>
        <button class="exam-btn">Gynecological Emergencies</button>

        <button class="exam-btn">Bleeding & Shock</button>
        <button class="exam-btn">Soft Tissue Injuries</button>
        <button class="exam-btn">Orthopedic Injuries</button>
        <button class="exam-btn">Head, Face & Neck</button>
        <button class="exam-btn">Comprehensive Final Exam</button>
    </div>

</body>
</html>
