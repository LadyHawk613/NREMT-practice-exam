<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NREMT Multiple Choice Practice</title>
<style>
  :root{
    --bg:#0d1414; --panel:#141d1d; --panel-raised:#1a2626; --line:#2a3838;
    --text:#e8efe9; --text-dim:#8fa39c; --amber:#e8a13a; --green:#4a9a6f; --red:#d1483f;
    --mono:
      'IBM Plex Mono',
      Consolas,
      monospace;
    --sans:
      'IBM Plex Sans',
      -apple-system,
      sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 14px 50px;
  }
  .app{ width:100%; max-width:520px; margin-bottom: 30px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:24px 20px; }
  .badge{
    font-family:var(--mono); font-size:10.5px; padding:4px 9px; border-radius:4px;
    background:rgba(232,161,58,0.12); color:var(--amber); border:1px solid #8a6a33;
    display:inline-block; margin-bottom:14px; letter-spacing:0.05em;
  }
  .scenario{ font-size:14px; color:var(--text-dim); line-height:1.6; margin-bottom:10px; padding-left:12px; border-left:2px solid var(--line); }
  .question-text{ font-size:16.5px; font-weight:600; line-height:1.5; margin-bottom:15px; }
  .options-list{
    display:flex; flex-direction:column; gap:10px; margin-bottom:20px;
  }
  .option-item{
    background:var(--panel-raised); border:1px solid var(--line); border-radius:6px;
    padding:12px 15px; user-select:none; cursor:pointer;
    transition:border-color .15s, background .15s;
    display:flex; align-items:center;
  }
  .option-item:hover:not(.selected):not(.correct):not(.incorrect){
    border-color:var(--amber);
  }
  .option-item.selected{
    border-color:var(--amber); background:rgba(232,161,58,0.06);
  }
  .option-item.correct{
    border-color:var(--green); background:rgba(74,154,111,0.1);
  }
  .option-item.incorrect{
    border-color:var(--red); background:rgba(209,72,63,0.1);
  }
  .option-item input[type="radio"]{
    margin-right:10px;
    accent-color: var(--amber);
  }
  .option-item.correct input[type="radio"]{
    accent-color: var(--green);
  }
  .option-item.incorrect input[type="radio"]{
    accent-color: var(--red);
  }

  button.primary{
    width:100%; padding:14px; font-size:14.5px; font-weight:600;
    background:var(--amber); color:#1a1206; border:none; border-radius:6px; cursor:pointer;
  }
  button.primary:disabled{ opacity:0.5; cursor:default; }
  button.secondary{
    width:100%; padding:12px; font-size:13.5px; font-weight:600; margin-top:8px;
    background:transparent; color:var(--text); border:1px solid var(--line); border-radius:6px; cursor:pointer;
  }
  .feedback{
    margin-top:16px; padding:13px 14px; border-radius:6px; font-size:13.5px; line-height:1.6;
    display:none;
  }
  .feedback.show{ display:block; }
  .feedback.pass{ background:rgba(74,154,111,0.1); border:1px solid var(--green); }
  .feedback.fail{ background:rgba(209,72,63,0.1); border:1px solid var(--red); }
  .feedback .label{ font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; display:block; }
  .feedback.pass .label{ color:var(--green); }
  .feedback.fail .label{ color:var(--red); }
</style>
</head>
<body>

<div id="questions-container"></div>

<script>
const questions = [
  {
    "id": "mcq5",
    "scenario": "You are treating a 22-year-old male who was struck in the head with a baseball bat. He initially lost consciousness, regained it, and is now becoming increasingly lethargic. His right pupil is dilated and sluggish to respond to light.",
    "question": "What pathophysiological process is MOST likely occurring, and what is the appropriate intervention?",
    "options": [
      "Subdural hematoma; administer high-flow oxygen and transport.",
      "Epidural hematoma; elevate the head of the bed 30 degrees and hyperventilate if signs of herniation are present.",
      "Concussion; monitor closely and transport non-emergently.",
      "Diffuse axonal injury; administer IV fluids to maintain blood pressure."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "The classic 'lucid interval' followed by rapid deterioration and a blown pupil is indicative of an epidural hematoma. Elevating the head of the bed 30 degrees helps reduce intracranial pressure. Hyperventilation (to a target EtCO2 of 30-35 mmHg) is only indicated if signs of active herniation (like the blown pupil) are present.",
    "feedbackIncorrect": "A subdural hematoma typically has a slower onset. A concussion does not present with a lucid interval followed by rapid deterioration and a blown pupil. Diffuse axonal injury is a severe, widespread brain injury that typically presents with immediate and prolonged unconsciousness. The lucid interval is the key differentiator here."
  },
  {
    "id": "mcq6",
    "scenario": "A 70-year-old male with a history of COPD presents with severe respiratory distress. He is using accessory muscles, has a barrel chest, and is speaking in 1-2 word sentences. His SpO2 is 88% on room air, and you hear diffuse wheezing on auscultation.",
    "question": "Which of the following interventions is MOST appropriate for this patient?",
    "options": [
      "Administer high-flow oxygen via non-rebreather mask at 15 L/min.",
      "Administer albuterol via nebulizer and consider CPAP.",
      "Assist ventilations with a bag-valve mask (BVM) immediately.",
      "Administer epinephrine via auto-injector."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "This patient is experiencing a severe COPD exacerbation. Albuterol is a bronchodilator that will help relieve the wheezing. CPAP is highly effective in COPD exacerbations by reducing the work of breathing and improving oxygenation. High-flow oxygen alone may not address the bronchospasm.",
    "feedbackIncorrect": "While oxygen is needed, high-flow oxygen via NRB without bronchodilators or positive pressure may not be sufficient and can sometimes worsen hypercapnia in severe COPD. BVM ventilation is indicated if the patient is in respiratory failure or arrest, but he is still conscious and breathing, making CPAP a better choice. Epinephrine is typically reserved for anaphylaxis or severe asthma unresponsive to other treatments."
  },
  {
    "id": "mcq7",
    "scenario": "You are assessing a 30-year-old female who is 32 weeks pregnant. She complains of a sudden onset of painless, bright red vaginal bleeding. Her vital signs are stable.",
    "question": "What is the MOST likely cause of her bleeding, and what is the appropriate management?",
    "options": [
      "Placenta previa; transport on her left side and monitor for shock.",

      "Uterine rupture; administer high-flow oxygen and rapid transport.",

    ],
    "correctAnswerIndex": 0,
    "feedbackCorrect": "Painless, bright red vaginal bleeding in the third trimester is the hallmark sign of placenta previa. Transporting the patient on her left side (left lateral recumbent position) prevents supine hypotensive syndrome. Monitoring for shock is crucial as bleeding can be significant.",
    "feedbackIncorrect": "Abruptio placentae typically presents with painful, dark red vaginal bleeding and a rigid abdomen. Uterine rupture is rare and usually presents with severe tearing pain and signs of shock. Ectopic pregnancy typically occurs in the first trimester, not the third."
  },
  {
    "id": "mcq8",
    "scenario": "A 45-year-old male is found unresponsive in a closed garage with a running vehicle. He is cyanotic and has a respiratory rate of 6 breaths per minute. His SpO2 reads 100%.",
    "question": "What is the MOST critical intervention for this patient, and why is the SpO2 reading misleading?",
    "options": [
      "Administer naloxone; the SpO2 is misleading due to poor perfusion.",
      "Remove the patient from the environment and administer high-flow oxygen; pulse oximeters cannot differentiate between oxygen and carbon monoxide bound to hemoglobin.",
      "Initiate CPR immediately; the SpO2 is misleading because the patient is in cardiac arrest.",
      "Administer albuterol; the SpO2 is misleading due to bronchospasm."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "This is a classic presentation of carbon monoxide (CO) poisoning. The most critical intervention is removing the patient from the toxic environment and administering high-flow oxygen. Standard pulse oximeters cannot distinguish between oxyhemoglobin and carboxyhemoglobin, leading to falsely high SpO2 readings in CO poisoning.",
    "feedbackIncorrect": "Naloxone is for opioid overdose, not CO poisoning. While the patient has a low respiratory rate, he is not in cardiac arrest (yet), so CPR is not the immediate first step; airway and oxygenation are. Albuterol is for bronchospasm, which is not the primary issue here."
  },
  {
    "id": "mcq9",

    "question": "What is the primary pathophysiological cause of her symptoms, and what is the most appropriate intervention?",
    "options": [
      "Right-sided heart failure; administer high-flow oxygen and transport.",
      "Left-sided heart failure (pulmonary edema); administer nitroglycerin and consider CPAP.",

    "correctAnswerIndex": 1,

    "feedbackIncorrect": "Right-sided heart failure typically presents with peripheral edema and jugular vein distention (JVD), not pulmonary edema. Pneumonia typically presents with fever and localized lung sounds, not pink frothy sputum and severe hypertension. Pulmonary embolism presents with clear lung sounds or localized wheezing/crackles, not diffuse crackles and pink frothy sputum."
  },
  {

    "feedbackIncorrect": "Cardiogenic shock is caused by pump failure, not trauma. Neurogenic shock typically presents with hypotension and bradycardia (or normal heart rate) and warm, dry skin below the level of injury. Septic shock is caused by infection, not trauma."

  {

    "feedbackIncorrect": "Croup typically presents with a low-grade fever and a 'seal-bark' cough, not drooling. Asthma presents with wheezing, not drooling or a muffled voice. While a foreign body could cause drooling, the high fever points to an infectious process like epiglottitis."
  },
  {
    "id": "mcq12",
    "scenario": "A 50-year-old male with a history of diabetes presents with altered mental status. His skin is cool and clammy. His blood glucose level is 35 mg/dL. He is unable to swallow.",
    "question": "What is the MOST appropriate intervention for this patient?",

      "Administer oral glucose paste between his cheek and gum.",

      "Administer insulin subcutaneously."

    "correctAnswerIndex": 2,
    "feedbackCorrect": "The patient is severely hypoglycemic and unable to swallow, making oral glucose contraindicated due to the risk of aspiration. The most appropriate and rapid intervention for a patient with an altered mental status and an intact IV line (or the ability to establish one) is intravenous 50% dextrose (D50).",
    "feedbackIncorrect": "Oral glucose is contraindicated in patients who cannot swallow. Glucagon can be used if IV access cannot be obtained, but D50 is preferred for its rapid onset. Insulin would worsen the hypoglycemia."
  },
  {
    "id": "mcq13",
    "scenario": "You are treating a 30-year-old female who was stung by a bee. She is experiencing severe respiratory distress, facial swelling, and diffuse hives. Her blood pressure is 80/50.",
    "question": "What is the primary pathophysiological mechanism causing her hypotension, and what is the first-line medication?",
    "options": [
      "Hypovolemia due to fluid loss; administer IV fluids.",
      "Vasodilation and increased capillary permeability; administer epinephrine.",
      "Bronchospasm; administer albuterol.",
      "Cardiac pump failure; administer dopamine."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "The patient is experiencing anaphylaxis. The hypotension is caused by massive vasodilation and increased capillary permeability (fluid leaking out of the blood vessels) due to the release of histamine and other mediators. Epinephrine is the first-line medication because it causes vasoconstriction (reversing hypotension) and bronchodilation (relieving respiratory distress).",
    "feedbackIncorrect": "While fluid shifts occur, the primary cause of hypotension is vasodilation, not absolute hypovolemia. Albuterol addresses bronchospasm but not the life-threatening hypotension or upper airway swelling. Anaphylaxis is a distributive shock, not cardiogenic shock."
  },
  {
    "id": "mcq14",
    "scenario": "A 75-year-old female presents with sudden onset of right-sided weakness and expressive aphasia. Her symptoms started 45 minutes ago. Her vital signs are stable.",
    "question": "What is the MOST critical piece of information to obtain, and what is the appropriate destination?",
    "options": [
      "A list of her current medications; transport to the closest hospital.",
      "The exact time she was last known well; transport to a primary or comprehensive stroke center.",
      "Her blood glucose level; transport to a trauma center.",
      "Her history of previous strokes; transport to a cardiac center."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "The patient is exhibiting signs of an acute ischemic stroke. The most critical piece of information is the exact time she was 'last known well,' as this determines her eligibility for thrombolytic therapy (tPA) or endovascular thrombectomy. She must be transported to a designated stroke center capable of providing these treatments.",
    "feedbackIncorrect": "While medications are important, the 'last known well' time is the primary determinant for acute stroke treatment. Blood glucose should be checked to rule out hypoglycemia (which can mimic a stroke), but the destination should be a stroke center, not a trauma center. A cardiac center is not the appropriate destination for a stroke."
  },
  {
    "id": "mcq15",
    "scenario": "You are assessing a 20-year-old male who was stabbed in the right side of his chest. He is in severe respiratory distress, has absent breath sounds on the right side, and his trachea is deviated to the left. His blood pressure is 70/40.",
    "question": "What is the MOST likely diagnosis, and what is the immediate life-saving intervention?",
    "options": [
      "Open pneumothorax; apply an occlusive dressing.",
      "Tension pneumothorax; perform needle pleural decompression.",
      "Massive hemothorax; administer IV fluids.",
      "Cardiac tamponade; perform pericardiocentesis."
    ],
    "correctAnswerIndex": 1,
    "feedbackCorrect": "The combination of severe respiratory distress, absent breath sounds on one side, tracheal deviation to the opposite side, and hypotension (obstructive shock) is the classic presentation of a tension pneumothorax. The immediate life-saving intervention is needle pleural decompression to relieve the pressure in the chest cavity.",
    "feedbackIncorrect": "An open pneumothorax would present with a sucking chest wound, and while an occlusive dressing is needed, the signs of tension (tracheal deviation, hypotension) require decompression. A massive hemothorax presents with dullness to percussion and flat neck veins, not typically tracheal deviation. Cardiac tamponade presents with muffled heart tones, JVD, and narrowing pulse pressure (Beck's triad)."
  },
  {
    "id": "mcq16",
    "scenario": "A 65-year-old male with a history of renal failure missed his last two dialysis appointments. He presents with profound weakness, bradycardia (HR 40), and peaked T waves on the ECG.",

    "options": [
      "Hypokalemia; administer potassium chloride.",
      "Hypercalcemia; administer normal saline.",
      "Hyperkalemia; administer calcium chloride or calcium gluconate.",
      "Hyponatremia; administer hypertonic saline."
    ],
    "correctAnswerIndex": 2,
    "feedbackCorrect": "Missed dialysis leads to the accumulation of potassium in the blood (hyperkalemia). Classic ECG changes for hyperkalemia include peaked T waves, widened QRS complexes, and bradycardia. Calcium chloride or calcium gluconate is administered to stabilize the cardiac cell membrane and prevent lethal arrhythmias.",
    "feedbackIncorrect": "Hypokalemia typically presents with U waves and flattened T waves. Hypercalcemia and hyponatremia do not typically present with this specific combination of missed dialysis, bradycardia, and peaked T waves."
  },
  {
    "id": "mcq17",
    "scenario": "You are treating a 10-month-old infant who has had severe diarrhea and vomiting for 3 days. The infant is lethargic, has sunken eyes, a sunken fontanelle, and delayed capillary refill (>4 seconds).",
    "question": "What is the MOST appropriate fluid resuscitation strategy for this patient?",

    "correctAnswerIndex": 0,
    "feedbackCorrect": "The infant is showing signs of severe dehydration and hypovolemic shock. The standard fluid resuscitation bolus for pediatric patients in shock is 20 mL/kg of an isotonic crystalloid (like normal saline or lactated Ringer's).",
    "feedbackIncorrect": "D5W is not an appropriate resuscitation fluid for hypovolemic shock as it rapidly leaves the intravascular space. Oral rehydration is insufficient for severe dehydration with altered mental status. A 50 mL/kg bolus is too large for an initial bolus and could cause fluid overload."
  },
  {
    "id": "mcq18",

    "feedbackCorrect": "Pain in the right upper quadrant that radiates to the right shoulder, especially after a fatty meal, is classic for cholecystitis (inflammation of the gallbladder).",

  {

    "feedbackIncorrect": "Secondary blast injuries are caused by flying debris (shrapnel). Tertiary blast injuries are caused by the patient being thrown by the blast wind. Quaternary blast injuries include burns, crush injuries, and toxic exposures."

  {

    "scenario": "A 28-year-old pregnant female (38 weeks gestation) is experiencing a seizure. Her husband states she has been complaining of a severe headache and visual disturbances for the past two days. She has no history of seizures.",

  },
  {
    "id": "mcq21",

    "question": "What is the MOST likely diagnosis, and what is the primary prehospital treatment?",

  {

function NREMTMultipleChoiceQuestion(questionData) {
  const container = document.getElementById('questions-container');
  const questionHtml = `
    <div class="app">
      <div class="card">
        <span class="badge">Multiple Choice · NREMT Practice</span>
        <div class="scenario">${questionData.scenario}</div>
        <div class="question-text">${questionData.question}</div>
        <div class="options-list" id="options-list-${questionData.id}"></div>

        <button class="primary" id="submitBtn-${questionData.id}">Submit Answer</button>
        <button class="secondary" id="resetBtn-${questionData.id}">Reset Question</button>

        <div class="feedback" id="feedback-${questionData.id}">
          <span class="label" id="fbLabel-${questionData.id}"></span>
          <span id="fbText-${questionData.id}"></span>
        </div>
      </div>
    </div>
  `;
  container.insertAdjacentHTML('beforeend', questionHtml);

  const optionsListEl = document.getElementById(`options-list-${questionData.id}`);
  const submitBtn = document.getElementById(`submitBtn-${questionData.id}`);
  const resetBtn = document.getElementById(`resetBtn-${questionData.id}`);
  const feedbackEl = document.getElementById(`feedback-${questionData.id}`);
  const fbLabelEl = document.getElementById(`fbLabel-${questionData.id}`);
  const fbTextEl = document.getElementById(`fbText-${questionData.id}`);

  let selectedOptionIndex = -1;
  let submitted = false;

  function renderOptions() {
    optionsListEl.innerHTML = '';
    questionData.options.forEach((option, index) => {
      const optionItem = document.createElement('label');
      optionItem.className = 'option-item';
      optionItem.innerHTML = `
        <input type="radio" name="${questionData.id}" value="${index}" ${selectedOptionIndex === index ? 'checked' : ''} ${submitted ? 'disabled' : ''}>
        ${option}
      `;
      if (submitted) {
        if (index === questionData.correctAnswerIndex) {
          optionItem.classList.add('correct');
        } else if (index === selectedOptionIndex) {
          optionItem.classList.add('incorrect');
        }
      } else if (index === selectedOptionIndex) {
        optionItem.classList.add('selected');
      }
      optionItem.addEventListener('click', () => {
        if (!submitted) {
          selectedOptionIndex = index;
          renderOptions();
        }
      });
      optionsListEl.appendChild(optionItem);
    });
    submitBtn.disabled = selectedOptionIndex === -1 || submitted;
  }

  submitBtn.addEventListener('click', () => {
    if (selectedOptionIndex === -1) return;
    submitted = true;
    renderOptions();
    submitBtn.disabled = true;
    resetBtn.style.display = 'block';

    const isCorrect = selectedOptionIndex === questionData.correctAnswerIndex;
    feedbackEl.className = `feedback show ${isCorrect ? 'pass' : 'fail'}`;
    fbLabelEl.textContent = isCorrect ? 'Correct Answer' : 'Incorrect Answer';
    fbTextEl.textContent = isCorrect ? questionData.feedbackCorrect : questionData.feedbackIncorrect;
  });

  resetBtn.addEventListener('click', () => {
    selectedOptionIndex = -1;
    submitted = false;
    feedbackEl.className = 'feedback';
    resetBtn.style.display = 'none';
    renderOptions();
  });

  renderOptions();
  resetBtn.style.display = 'none'; // Hide reset button initially
}

// Initialize all questions
questions.forEach(q => new NREMTMultipleChoiceQuestion(q));
</script>
